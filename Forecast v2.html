<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SKU Forecast & Safety Stock Analyzer</title>
<style>
:root{
  --bg:#f4f7fb; --panel:#ffffff; --ink:#172033; --muted:#68748a; --line:#d9e0ea;
  --brand:#173b63; --brand2:#2d6cdf; --ok:#16875d; --warn:#b7791f; --bad:#b42318; --soft:#eef4ff;
  --shadow:0 10px 28px rgba(23,32,51,.08); --radius:18px;
  --thbg:#f1f5fb; --thms:#263650; --hoverbg:#f8fbff; --inputbg:#ffffff; --inputline:#cfd8e6;
  --dropbg:#f8fbff; --dropline:#98acd0; --chartbg:#ffffff; --axis:#cbd5e1; --axislabel:#68748a;
  --badgebg:#eef4ff; --badgeink:#173b63; --goodbg:#e9f8f1; --goodink:#087348; --warnbg:#fff4dd; --warnink:#905a00;
  --badbg:#ffe7e3; --badink:#a32014; --graybg:#edf0f5; --grayink:#536073;
  --headg1:#0f2742; --headg2:#1f5ca8; --noticebg:#eef4ff; --noticeink:#263650; --warnboxbg:#fff8e8;
  --secbtnbg:#eef4ff; --secbtnink:#173b63; --secbtnline:#bfd1f3; --tabinact:#eef4ff;
}
html[data-theme="dark"]{
  --bg:#0c1322; --panel:#151f35; --ink:#e8eefb; --muted:#96a3bd; --line:#273657;
  --brand:#9dc0ff; --brand2:#4d8dff; --ok:#3ecf8e; --warn:#f0b64a; --bad:#ff7a66; --soft:#1a2542;
  --shadow:0 10px 28px rgba(0,0,0,.45);
  --thbg:#1b2745; --thms:#c9d7f2; --hoverbg:#1c2947; --inputbg:#101a30; --inputline:#33436b;
  --dropbg:#111c33; --dropline:#3d5388; --chartbg:#111a2f; --axis:#3a4a70; --axislabel:#8fa0c2;
  --badgebg:#1e2c4f; --badgeink:#b9d0f8; --goodbg:#0e3527; --goodink:#5fe0a8; --warnbg:#3d2f0c; --warnink:#f4c86a;
  --badbg:#43150f; --badink:#ff9a8a; --graybg:#242f4a; --grayink:#9fb0cd;
  --headg1:#0a1930; --headg2:#153b73; --noticebg:#1a2542; --noticeink:#c6d4ef; --warnboxbg:#2e2510;
  --secbtnbg:#1c2947; --secbtnink:#b9d0f8; --secbtnline:#33436b; --tabinact:#1c2947;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink);transition:background .25s,color .25s}
header{background:linear-gradient(135deg,var(--headg1),var(--headg2));color:#fff;padding:24px 28px 28px;position:relative;overflow:hidden}
header:after{content:"";position:absolute;right:-80px;top:-100px;width:330px;height:330px;background:rgba(255,255,255,.10);border-radius:50%}
h1{margin:0;font-size:28px;letter-spacing:-.5px}.subtitle{margin:8px 0 0;max-width:1120px;color:#dbe8ff;font-size:15px;line-height:1.45}.author{font-size:12px;color:#c9daf8;margin-top:10px}.author a{color:#fff;font-weight:700}
.headctrl{position:absolute;top:18px;right:22px;display:flex;gap:8px;z-index:2}
.headctrl button{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:10px;padding:7px 12px;font-weight:800;font-size:12px;cursor:pointer;box-shadow:none}
.headctrl button:hover{background:rgba(255,255,255,.26)}
main{padding:22px;max-width:1480px;margin:auto}.grid{display:grid;gap:16px}.grid.cols-2{grid-template-columns:1fr 1fr}.grid.cols-3{grid-template-columns:repeat(3,1fr)}.grid.cols-4{grid-template-columns:repeat(4,1fr)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}.panel h2{font-size:17px;margin:0 0 12px}.panel h3{font-size:14px;margin:12px 0 8px;color:var(--brand)}
.drop{border:2px dashed var(--dropline);background:var(--dropbg);border-radius:18px;padding:22px;text-align:center}.drop input{margin-top:14px;color:var(--ink)}.small{font-size:12px;color:var(--muted);line-height:1.45}.muted{color:var(--muted)}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:8px 0 5px}input,select,button,textarea{font:inherit}input,select{width:100%;border:1px solid var(--inputline);border-radius:10px;padding:9px 10px;background:var(--inputbg);color:var(--ink)}input[type=checkbox]{width:auto;margin-right:8px}
button{border:none;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;background:var(--brand2);color:white;box-shadow:0 6px 16px rgba(45,108,223,.20)}
button.secondary{background:var(--secbtnbg);color:var(--secbtnink);box-shadow:none;border:1px solid var(--secbtnline)}button.danger{background:#b42318}.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.hidden{display:none!important}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow)}.kpi .label{font-size:12px;color:var(--muted);font-weight:700}.kpi .value{font-size:26px;font-weight:900;margin-top:4px;color:var(--brand)}.kpi .note{font-size:11px;color:var(--muted);margin-top:4px}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:800;background:var(--badgebg);color:var(--badgeink)}.badge.good{background:var(--goodbg);color:var(--goodink)}.badge.warn{background:var(--warnbg);color:var(--warnink)}.badge.bad{background:var(--badbg);color:var(--badink)}.badge.gray{background:var(--graybg);color:var(--grayink)}
.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:14px;background:var(--panel);max-height:540px}table{border-collapse:collapse;width:100%;font-size:12px}th,td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
th{position:sticky;top:0;background:var(--thbg);color:var(--thms);z-index:1;cursor:pointer;user-select:none}th .arrow{font-size:9px;opacity:.85}
td.num{text-align:right;font-variant-numeric:tabular-nums}tr:hover td{background:var(--hoverbg)}tbody tr{cursor:pointer}
.chartbox{min-height:260px;border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:12px;box-shadow:var(--shadow)}.charttitle{font-size:13px;font-weight:900;color:var(--brand);margin-bottom:8px}.svgchart{width:100%;height:230px;display:block}
.notice{border-left:4px solid var(--brand2);background:var(--noticebg);border-radius:12px;padding:12px;color:var(--noticeink);font-size:13px;line-height:1.45}.warnbox{border-left-color:#b7791f;background:var(--warnboxbg)}
.status{padding:10px 12px;border-radius:12px;background:var(--soft);color:var(--badgeink);font-size:13px;margin-top:12px}
.footer{font-size:11px;color:var(--muted);margin:20px 0 0;line-height:1.5}
.copyright{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}.copyright a{color:var(--brand2);font-weight:700}
.mapping{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.filters{display:grid;grid-template-columns:1.4fr repeat(5,1fr);gap:10px;align-items:end}
.toggleline{display:flex;align-items:center;gap:8px;margin-top:8px}.pillrow{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 0}.recommend{font-size:12px;line-height:1.35;max-width:520px;white-space:normal}
.modal{position:fixed;inset:0;background:rgba(6,12,24,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:18px}
.modalbox{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);max-width:900px;width:100%;max-height:92vh;overflow:auto;padding:20px}
.modalbox h2{margin:0 0 4px;font-size:18px;color:var(--brand)}.modalhead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.dstats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}.dstat{background:var(--soft);border-radius:12px;padding:10px}.dstat .l{font-size:11px;color:var(--muted);font-weight:700}.dstat .v{font-size:16px;font-weight:900;color:var(--brand);margin-top:2px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:6px}.legend span{display:inline-flex;align-items:center;gap:5px}.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
@media(max-width:1050px){.grid.cols-2,.grid.cols-3,.grid.cols-4,.mapping,.filters,.dstats{grid-template-columns:1fr}header{padding:22px 18px 60px}main{padding:14px}.tablewrap{max-height:420px}.headctrl{top:auto;bottom:12px;right:14px}}
@media print{body{background:#fff}.panel,.kpi,.chartbox{box-shadow:none}.btnrow,.drop,#configPanel,#filtersPanel,.headctrl{display:none!important}header{color:#111;background:#fff;border-bottom:2px solid #111}.subtitle,.author{color:#333}}
</style>
</head>
<body>
<header>
  <div class="headctrl">
    <button id="langBtn" title="Español / English">EN</button>
    <button id="themeBtn" title="Tema">🌙</button>
  </div>
  <h1 data-i18n="title">SKU Forecast & Safety Stock Analyzer</h1>
  <div class="subtitle" data-i18n="subtitle"></div>
  <div class="author"><span data-i18n="author"></span> <a href="https://www.linkedin.com/in/jvazquezh/" target="_blank" rel="noopener">Jesús Vázquez</a> · © <span id="yearTop"></span></div>
</header>
<main>
  <section class="grid cols-2">
    <div class="panel">
      <h2 data-i18n="sec1"></h2>
      <div class="drop">
        <strong data-i18n="dropTitle"></strong>
        <div class="small" data-i18n="dropHint"></div>
        <input id="fileInput" type="file" accept=".xlsx,.csv" />
        <div class="btnrow" style="justify-content:center">
          <button class="secondary" id="demoBtn" data-i18n="demoBtn"></button>
          <button class="secondary" id="templateBtn" data-i18n="templateBtn"></button>
        </div>
      </div>
      <div id="loadStatus" class="status hidden"></div>
      <div class="notice warnbox" style="margin-top:12px">
        <strong data-i18n="noteLbl"></strong> <span data-i18n="note"></span>
      </div>
    </div>
    <div class="panel" id="configPanel">
      <h2 data-i18n="sec2"></h2>
      <div class="grid cols-4">
        <div><label data-i18n="lblService"></label><input id="serviceLevel" type="number" min="50" max="99.9" step="0.1" value="95" /></div>
        <div><label data-i18n="lblLtUnit"></label><select id="ltUnit"><option value="days" data-i18n="days"></option><option value="weeks" data-i18n="weeksU"></option></select></div>
        <div><label data-i18n="lblDefLT"></label><input id="defaultLT" type="number" min="0" step="0.1" value="21" /></div>
        <div><label data-i18n="lblDefGR"></label><input id="defaultGR" type="number" min="0" step="0.1" value="5" /></div>
      </div>
      <div class="grid cols-4">
        <div><label data-i18n="lblAlpha"></label><input id="alpha" type="number" min="0.01" max="0.99" step="0.01" value="0.30" /></div>
        <div><label data-i18n="lblBeta"></label><input id="beta" type="number" min="0.01" max="0.99" step="0.01" value="0.10" /></div>
        <div><label data-i18n="lblGamma"></label><input id="gamma" type="number" min="0.01" max="0.99" step="0.01" value="0.10" /></div>
        <div><label data-i18n="lblSeason"></label><select id="seasonLen"><option value="auto" data-i18n="auto"></option><option value="12">12</option><option value="52">52</option><option value="4">4</option></select></div>
      </div>
      <div class="grid cols-3">
        <div class="toggleline"><input id="excludeOutliers" type="checkbox" checked /><span class="small"><strong data-i18n="exclOut"></strong> <span data-i18n="exclOut2"></span></span></div>
        <div><label data-i18n="lblIqr"></label><input id="iqrK" type="number" min="1" max="5" step="0.1" value="1.5" /></div>
        <div><label data-i18n="lblMa"></label><input id="maWindow" type="number" min="2" max="26" step="1" value="4" /></div>
      </div>
      <div id="mappingPanel" class="hidden">
        <h3 data-i18n="mapTitle"></h3>
        <div class="mapping">
          <div><label data-i18n="mapSku"></label><select id="skuCol"></select></div>
          <div><label data-i18n="mapLt"></label><select id="ltCol"></select></div>
          <div><label data-i18n="mapGr"></label><select id="grCol"></select></div>
          <div><label data-i18n="mapFirst"></label><select id="firstPeriodCol"></select></div>
          <div><label data-i18n="mapLast"></label><select id="lastPeriodCol"></select></div>
        </div>
        <div class="btnrow"><button id="analyzeBtn" data-i18n="analyzeBtn"></button><button class="secondary" id="resetBtn" data-i18n="resetBtn"></button></div>
      </div>
    </div>
  </section>

  <section id="dashboard" class="hidden">
    <div class="grid cols-4" style="margin-top:16px">
      <div class="kpi"><div class="label" data-i18n="kSkus"></div><div class="value" id="kpiSkus">0</div><div class="note" data-i18n="kSkusNote"></div></div>
      <div class="kpi"><div class="label" data-i18n="kSS"></div><div class="value" id="kpiSS">0</div><div class="note" data-i18n="kSSNote"></div></div>
      <div class="kpi"><div class="label" data-i18n="kInt"></div><div class="value" id="kpiIntermittent">0%</div><div class="note" data-i18n="kIntNote"></div></div>
      <div class="kpi"><div class="label" data-i18n="kOut"></div><div class="value" id="kpiOutliers">0</div><div class="note" data-i18n="kOutNote"></div></div>
    </div>

    <div class="panel" id="filtersPanel" style="margin-top:16px">
      <h2 data-i18n="filters"></h2>
      <div class="filters">
        <div><label data-i18n="searchSku"></label><input id="searchSku" data-i18n-ph="searchPh" /></div>
        <div><label>ABC</label><select id="filterABC"></select></div>
        <div><label>XYZ</label><select id="filterXYZ"></select></div>
        <div><label data-i18n="demandType"></label><select id="filterDemand"></select></div>
        <div><label data-i18n="modelLbl"></label><select id="filterModel"></select></div>
        <div><label data-i18n="metaFilter"></label><select id="filterMeta"></select></div>
      </div>
      <div id="metaValueWrap" class="hidden" style="max-width:280px;margin-top:10px"><label data-i18n="metaValue"></label><select id="filterMetaValue"></select></div>
      <div class="btnrow"><button class="secondary" id="applyFiltersBtn" data-i18n="apply"></button><button class="secondary" id="clearFiltersBtn" data-i18n="clearF"></button></div>
    </div>

    <div class="grid cols-2" style="margin-top:16px">
      <div class="chartbox"><div class="charttitle" data-i18n="chScatter"></div><svg id="scatterChart" class="svgchart"></svg></div>
      <div class="chartbox"><div class="charttitle" data-i18n="chWeekly"></div><svg id="weeklyChart" class="svgchart"></svg></div>
      <div class="chartbox"><div class="charttitle" data-i18n="chMatrix"></div><svg id="matrixChart" class="svgchart"></svg></div>
      <div class="chartbox"><div class="charttitle" data-i18n="chDemand"></div><svg id="demandChart" class="svgchart"></svg></div>
      <div class="chartbox"><div class="charttitle" data-i18n="chTop"></div><svg id="topSSChart" class="svgchart"></svg></div>
      <div class="chartbox"><div class="charttitle" data-i18n="chModel"></div><svg id="modelChart" class="svgchart"></svg></div>
    </div>

    <div class="panel" style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap">
        <h2 style="margin:0" data-i18n="results"></h2>
        <div class="btnrow" style="margin:0">
          <button class="secondary" id="toggleRowsBtn"></button>
          <button id="downloadXlsxBtn" data-i18n="dlXlsx"></button>
          <button class="secondary" id="downloadCsvBtn" data-i18n="dlCsv"></button>
          <button class="secondary" id="downloadPdfBtn" data-i18n="dlPdf"></button>
        </div>
      </div>
      <div class="pillrow" id="summaryPills"></div>
      <p class="small" data-i18n="tableNote"></p>
      <div class="tablewrap"><table id="resultsTable"></table></div>
    </div>
  </section>

  <div class="footer">
    <strong>Disclaimer:</strong> <span data-i18n="disclaimer"></span>
    <div class="copyright">© <span id="yearBottom"></span> <strong>Jesús Vázquez</strong> — <span data-i18n="rights"></span> · <a href="https://www.linkedin.com/in/jvazquezh/" target="_blank" rel="noopener">LinkedIn: /in/jvazquezh</a></div>
  </div>
</main>

<div id="detailModal" class="modal hidden">
  <div class="modalbox">
    <div class="modalhead">
      <div><h2 id="dTitle"></h2><div class="small" id="dSub"></div></div>
      <button class="secondary" id="dClose" data-i18n="close"></button>
    </div>
    <div class="dstats" id="dStats"></div>
    <div class="charttitle" data-i18n="dSeries"></div>
    <svg id="detailChart" class="svgchart" style="height:280px"></svg>
    <div class="legend" id="dLegend"></div>
    <div class="notice" style="margin-top:12px" id="dRec"></div>
  </div>
</div>

<script>

const $ = id => document.getElementById(id);
const state = {headers:[], rows:[], metadataCols:[], results:[], filtered:[], periodHeaders:[], fileName:'', mapping:null, sort:{key:'advancedSS',dir:-1}, topOnly:true};
const PERIOD_MAX_TABLE_ROWS = 300;

}

function loadRows(rows, name){
  rows = rows.filter(r => r && r.some(c => c!==null && c!==undefined && String(c).trim()!==''));
  if(rows.length<2) throw new Error('No data.');
  state.headers = rows[0].map((h,i)=> String(h??('Col_'+(i+1))).trim() || ('Col_'+(i+1)) );
  state.rows = rows.slice(1);
  detectMapping();
  populateMapping();
  $('mappingPanel').classList.remove('hidden');
  setStatus(t('statusLoaded')(name, state.rows.length.toLocaleString(locale()), state.headers.length));
}

function detectMapping(){
  const headers=state.headers;
  const lower=headers.map(normHeader);
  const skuIdx = lower.findIndex(h=>/^(material|sku|item|part|producto|codigo|código)/.test(h));
  let ltIdx = lower.findIndex(h=>/^lt$|lead\s*time|manufact|manufactura|tiempo/.test(h));
  let grIdx = lower.findIndex(h=>/gr\s*processing|transit|tr[aá]nsito|transport|processing/.test(h));
  if(ltIdx<0) ltIdx = lower.findIndex(h=>h.includes('lt'));
  if(grIdx<0) grIdx = lower.findIndex(h=>h.includes('gr'));
  const totalIdx = lower.findIndex(h=>/^total$|grand\s*total|suma/.test(h));
  const numericRatio = (c)=>{
    let checked=0, num=0;
    for(let i=0;i<Math.min(80,state.rows.length);i++){ const v=state.rows[i][c]; if(v!==''&&v!==null&&v!==undefined){ checked++; if(Number.isFinite(safeNum(v))) num++; } }
    return checked?num/checked:0;
  };
  const protectedIdx = new Set([skuIdx,ltIdx,grIdx,totalIdx].filter(i=>i>=0));
  let first=-1,last=-1;
  for(let c=0;c<headers.length;c++){
    if(protectedIdx.has(c)) continue;
    if(totalIdx>=0 && c>=totalIdx) continue;
    const h=lower[c];
    const looksPeriod = /^(w|wk|week|sem|semana|period|periodo|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|ene|abr|ago|dic|\d{4}|\d{1,2}[\/\-])/.test(h) || numericRatio(c)>=0.65;
    if(looksPeriod){ if(first<0) first=c; last=c; }
    else if(first>=0 && last>=first) break;
  }
  if(first<0){ first=Math.max(skuIdx,ltIdx,grIdx,0)+1; last=(totalIdx>first?totalIdx-1:headers.length-1); }
  state.mapping={skuIdx:skuIdx>=0?skuIdx:0, ltIdx:ltIdx>=0?ltIdx:1, grIdx:grIdx>=0?grIdx:2, firstIdx:first, lastIdx:last};
}

function populateMapping(){
  const opts = state.headers.map((h,i)=>`<option value="${i}">${escapeHtml(colName(i)+' - '+h)}</option>`).join('');
  ['skuCol','ltCol','grCol','firstPeriodCol','lastPeriodCol'].forEach(id=>$(id).innerHTML=opts);
  $('skuCol').value=state.mapping.skuIdx; $('ltCol').value=state.mapping.ltIdx; $('grCol').value=state.mapping.grIdx; $('firstPeriodCol').value=state.mapping.firstIdx; $('lastPeriodCol').value=state.mapping.lastIdx;
}

function analyze(){
  if(!state.rows.length) return;
  const p=currentParams();
  if(p.lastIdx<p.firstIdx){ alert(t('alertPeriod')); return; }
  state.periodHeaders = state.headers.slice(p.firstIdx,p.lastIdx+1);
  setStatus(t('statusAnalyzing'));
  setTimeout(()=>{
    const raw=[]; let outlierTotal=0;
    for(const row of state.rows){
      const sku=String(row[p.skuIdx]??'').trim(); if(!sku) continue;
      const demand=[];
      for(let c=p.firstIdx;c<=p.lastIdx;c++){ const n=safeNum(row[c]); demand.push(Number.isFinite(n)?Math.max(0,n):0); }
      const meta={};
      state.headers.forEach((h,i)=>{ if(i<p.firstIdx && ![p.skuIdx,p.ltIdx,p.grIdx].includes(i)) meta[h]=row[i]??''; });
      const metrics = calcSkuMetrics(sku,row,demand,meta,p);
      raw.push(metrics); outlierTotal += metrics.outliers;
    }
    classifyABC(raw); classifyXYZ(raw);
    state.results=raw; state.filtered=raw.slice();
    refreshFilterOptions(); renderDashboard();
    $('dashboard').classList.remove('hidden');
    setStatus(t('statusDone')(raw.length.toLocaleString(locale()), outlierTotal.toLocaleString(locale())));
    $('dashboard').scrollIntoView?.({behavior:'smooth'});
  },20);
}

function calcSkuMetrics(sku,row,demand,meta,p){
  const nonzero=demand.filter(v=>v>0);
  const q1=quantile(nonzero,0.25), q3=quantile(nonzero,0.75), iqr=Number.isFinite(q3-q1)?(q3-q1):0;

  const outlierFlags=demand.map(v=>v>0 && Number.isFinite(upper) && iqr>0 && v>upper);
  const outliers=outlierFlags.filter(Boolean).length;
  const metricDemand=demand.map((v,i)=> p.excludeOutliers && outlierFlags[i] ? NaN : v);
  const modelDemand=demand.map((v,i)=> p.excludeOutliers && outlierFlags[i] ? med : v);
  const validPeriods=metricDemand.filter(Number.isFinite).length;
  const nonzeroClean=metricDemand.filter(v=>Number.isFinite(v)&&v>0);
  const avg=mean(metricDemand), sd=stdev(metricDemand), total=sum(metricDemand);
  const cv=avg>0?sd/avg:0;
  const avgNonzero=mean(nonzeroClean), sdNonzero=stdev(nonzeroClean);
  const cvDemandSize=avgNonzero>0?sdNonzero/avgNonzero:0;
  const cv2=cvDemandSize*cvDemandSize;
  const adi=nonzeroClean.length>0?validPeriods/nonzeroClean.length:999;
  const demandClass = classifyDemand(adi,cv2,avg,nonzeroClean.length);
  const ltRaw = Number.isFinite(safeNum(row[p.ltIdx])) ? safeNum(row[p.ltIdx]) : p.defaultLT;
  const grRaw = Number.isFinite(safeNum(row[p.grIdx])) ? safeNum(row[p.grIdx]) : p.defaultGR;
  const ltWeeks = p.ltUnit==='days' ? Math.max(0,(ltRaw+grRaw)/7) : Math.max(0,ltRaw+grRaw);
  const z = normInv(p.serviceLevel/100);
  const basicSS = demandClass==='No demand'?0:z*sd*Math.sqrt(Math.max(ltWeeks,0));
  const factor = {Smooth:1.00,Intermittent:1.15,Erratic:1.25,Lumpy:1.40,'No demand':0}[demandClass] ?? 1;
  const advancedSS = Math.max(0,basicSS*factor);
  const cycleStock = Math.max(0,avg*ltWeeks);
  const reorderPoint = cycleStock + advancedSS;
  const forecastObj = chooseForecastModel(modelDemand,demandClass,p);
  const serviceRisk = riskBand(demandClass,cv,adi,ltWeeks);

    sku, ltRaw, grRaw, ltWeeks, periods:demand.length, demandWeeks:nonzeroClean.length, totalDemand:total, avgWeekly:avg, sdWeekly:sd,
    cv, cv2, adi, demandClass, abc:'', xyz:'', abcxyz:'', serviceLevel:p.serviceLevel, z, basicSS, advancedSS, reorderPoint,
    forecastNext:forecastObj.forecast, forecastLT:forecastObj.forecast*Math.max(1,ltWeeks), model:forecastObj.model, modelError:forecastObj.error,
    outliers, outlierFence:upper, serviceRisk, meta, demand, outlierFlags, maWindow:p.maWindow
  };
}
function recommendation(r){
  const key={'No demand':'recNoDemand','Smooth':'recSmooth','Intermittent':'recIntermittent','Erratic':'recErratic','Lumpy':'recLumpy'}[r.demandClass];
  const v=t(key); return typeof v==='function'?v(r.model):v;
}
function riskLabel(x){ return {high:t('riskHigh'),med:t('riskMed'),ok:t('riskOk'),none:t('riskNone')}[x]||x; }
function classifyDemand(adi,cv2,avg,nonzeroCount){ if(avg<=0||nonzeroCount===0) return 'No demand'; if(adi<1.32 && cv2<0.49) return 'Smooth'; if(adi>=1.32 && cv2<0.49) return 'Intermittent'; if(adi<1.32 && cv2>=0.49) return 'Erratic'; return 'Lumpy'; }
function classifyABC(rows){ const total=rows.reduce((s,r)=>s+Math.max(0,r.avgWeekly),0); let cum=0; rows.slice().sort((a,b)=>b.avgWeekly-a.avgWeekly).forEach(r=>{ cum+=Math.max(0,r.avgWeekly); const pct=total?cum/total:1; r.abc=pct<=0.80?'A':pct<=0.95?'B':'C'; r.abcxyz=r.abc+(r.xyz||''); }); }
function classifyXYZ(rows){ rows.forEach(r=>{ r.xyz = r.cv<=0.5?'X':r.cv<=1.0?'Y':'Z'; r.abcxyz=(r.abc||'')+r.xyz; }); }
function riskBand(cls,cv,adi,ltw){ if(cls==='No demand') return 'none'; if(cls==='Lumpy'||cv>1.5||adi>4||ltw>8) return 'high'; if(cls==='Intermittent'||cls==='Erratic'||cv>0.8||adi>2) return 'med'; return 'ok'; }

function chooseForecastModel(series,cls,p){
  if(cls==='No demand') return {model:'No forecast', forecast:0, error:0};
  let candidates;
  if(cls==='Smooth') candidates=['Naive','Moving Average','SES','Holt','Holt-Winters'];
  else if(cls==='Intermittent') candidates=['Croston','SBA','TSB','Moving Average','Naive'];
  else if(cls==='Erratic') candidates=['Moving Average','SES','Holt','Naive'];
  else candidates=['TSB','SBA','Croston','Naive'];
  const seasonLen = resolveSeasonLen(series.length,p.seasonLen);
  candidates = candidates.filter(m=> m!=='Holt-Winters' || series.length>=seasonLen*2);
  let best=null;
  for(const m of candidates){ const error=backtestError(series,m,p,seasonLen); const forecast=forecastModel(series,m,p,seasonLen); if(Number.isFinite(forecast) && (!best || error<best.error)){ best={model:m,forecast:Math.max(0,forecast),error}; } }
  return best || {model:'Naive', forecast:Math.max(0,series[series.length-1]||0), error:0};

function resolveSeasonLen(n,opt){ if(opt!=='auto') return +opt; return n>=104?52:n>=24?12:4; }
function backtestError(series,model,p,seasonLen){
  const n=series.length; const hold=Math.min(12,Math.max(4,Math.floor(n*.20))); const start=Math.max(4,n-hold); let abs=0, denom=0, count=0;
  for(let t=start;t<n;t++){ const train=series.slice(0,t); const pred=forecastModel(train,model,p,seasonLen); const actual=series[t]; if(Number.isFinite(pred)&&Number.isFinite(actual)){ abs+=Math.abs(actual-pred); denom+=Math.abs(actual); count++; } }
  if(!count) return 999999; return denom>0?abs/denom:abs/count;
}
function forecastModel(y,model,p,seasonLen){
  const a=p.alpha,b=p.beta,g=p.gamma; const n=y.length; if(!n) return 0;
  if(model==='Naive') return y[n-1]||0;
  if(model==='Moving Average'){ const w=Math.min(p.maWindow,n); return mean(y.slice(n-w)); }
  if(model==='SES'){ let level=y[0]||0; for(let i=1;i<n;i++) level=a*y[i]+(1-a)*level; return level; }
  if(model==='Holt'){ let l=y[0]||0, tr=(y[1]??y[0])-y[0]; for(let i=1;i<n;i++){ const prev=l; l=a*y[i]+(1-a)*(l+tr); tr=b*(l-prev)+(1-b)*tr; } return l+tr; }
  if(model==='Croston'||model==='SBA') return croston(y,a,model==='SBA');
  if(model==='TSB') return tsb(y,a);
  if(model==='Holt-Winters') return holtWintersAdditive(y,seasonLen,a,b,g);
  return y[n-1]||0;
}
function croston(y,a,sba=false){
  let first=y.findIndex(v=>v>0); if(first<0) return 0; let q=y[first], p=first+1, interval=1, f=q/p;
  for(let i=first+1;i<y.length;i++){ if(y[i]>0){ q=a*y[i]+(1-a)*q; p=a*interval+(1-a)*p; interval=1; } else interval++; f=p>0?q/p:0; }
  return sba ? (1-a/2)*f : f;
}
function tsb(y,a){ const nz=y.filter(v=>v>0); if(!nz.length) return 0; let prob=nz.length/y.length, size=mean(nz); for(const v of y){ const occ=v>0?1:0; prob=a*occ+(1-a)*prob; if(v>0) size=a*v+(1-a)*size; } return prob*size; }
function holtWintersAdditive(y,s,a,b,g){ if(y.length<s*2) return NaN; let l=mean(y.slice(0,s)); let tr=(mean(y.slice(s,2*s))-mean(y.slice(0,s)))/s; let seas=[]; for(let i=0;i<s;i++) seas[i]=(y[i]||0)-l; for(let i=s;i<y.length;i++){ const idx=i%s; const prevL=l; l=a*(y[i]-seas[idx])+(1-a)*(l+tr); tr=b*(l-prevL)+(1-b)*tr; seas[idx]=g*(y[i]-l)+(1-g)*seas[idx]; } return Math.max(0,l+tr+seas[y.length%s]); }

function applyFilters(){
  const q=normHeader($('searchSku').value), abc=$('filterABC').value, xyz=$('filterXYZ').value, d=$('filterDemand').value, m=$('filterModel').value, meta=$('filterMeta').value, mv=$('filterMetaValue').value;
  state.filtered = state.results.filter(r=>{
    if(q && !normHeader(r.sku).includes(q) && !Object.values(r.meta).some(v=>normHeader(v).includes(q))) return false;
    if(abc && r.abc!==abc) return false; if(xyz && r.xyz!==xyz) return false; if(d && r.demandClass!==d) return false; if(m && r.model!==m) return false;
    if(meta && mv && String(r.meta[meta]??'')!==mv) return false; return true;
  });
  renderDashboard();
}

function drawDetailChart(svg,r){
  svgClear(svg);

  const y=r.demand, n=y.length; if(!n) return;

  const xs=i=>padL+(W-padL-padR)*i/Math.max(1,n); const ys=v=>H-padB-(H-padT-padB)*v/maxY;
  for(let g=0;g<=4;g++){ const gy=padT+(H-padT-padB)*g/4; svg.appendChild(node('line',{x1:padL,y1:gy,x2:W-padR,y2:gy,stroke:css('--axis'),'stroke-width':.6})); svg.appendChild(node('text',{x:padL-6,y:gy+3,'text-anchor':'end','font-size':9,fill:css('--axislabel')})).textContent=fmt0(maxY*(1-g/4)); }
  // bars
  const bw=Math.max(1,(W-padL-padR)/n-1);
  y.forEach((v,i)=>{ if(v<=0) return; svg.appendChild(node('rect',{x:xs(i),y:ys(v),width:bw,height:H-padB-ys(v),fill:r.outlierFlags[i]?css('--bad'):css('--brand2'),opacity:r.outlierFlags[i]?.95:.65,rx:1})); });
  // moving average line

  for(let i=0;i<n;i++){ const seg=y.slice(Math.max(0,i-w+1),i+1); const m=mean(seg); d+=(i?'L':'M')+(xs(i)+bw/2).toFixed(1)+' '+ys(m).toFixed(1)+' '; }
  svg.appendChild(node('path',{d,fill:'none',stroke:css('--warn'),'stroke-width':2}));
  // forecast marker
  const fx=xs(n-1)+bw+14, fy=ys(r.forecastNext);
  svg.appendChild(node('line',{x1:xs(n-1)+bw/2,y1:ys(y[n-1]||0),x2:fx,y2:fy,stroke:css('--ok'),'stroke-width':2,'stroke-dasharray':'5 4'}));
  svg.appendChild(node('circle',{cx:fx,cy:fy,r:5,fill:css('--ok')}));
  svg.appendChild(node('text',{x:W/2,y:H-6,'text-anchor':'middle','font-size':10,fill:css('--axislabel')})).textContent=t('axPeriods');
}

function countBy(rows,key){ const m={}; rows.forEach(r=>{ const k=r[key]||''; m[k]=(m[k]||0)+1; }); return Object.entries(m).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value); }

function drawBarChart(svg,data){ svgClear(svg); const W=svg.clientWidth||600,H=230,pad=36; const max=Math.max(1,...data.map(d=>d.value)); const bw=(W-pad*2)/Math.max(1,data.length); svg.appendChild(node('line',{x1:pad,y1:H-pad,x2:W-pad,y2:H-pad,stroke:css('--axis')})); data.forEach((d,i)=>{ const h=(H-pad*2)*d.value/max; const x=pad+i*bw+5,y=H-pad-h; const fill=classColor(d.label)!==css('--axislabel')&&['Smooth','Intermittent','Erratic','Lumpy','No demand'].includes(d.label)?classColor(d.label):css('--brand2'); svg.appendChild(node('rect',{x,y,width:Math.max(10,bw-10),height:h,rx:5,fill})); svg.appendChild(node('text',{x:x+(bw-10)/2,y:y-5,'text-anchor':'middle','font-size':11,fill:css('--ink'),'font-weight':700})).textContent=d.value; svg.appendChild(node('text',{x:x+(bw-10)/2,y:H-12,'text-anchor':'middle','font-size':10,fill:css('--axislabel')})).textContent=String(d.label).slice(0,14); }); }
function drawHorizontalBar(svg,data){ svgClear(svg); const W=svg.clientWidth||600,H=230,padL=110,padR=44,rowH=Math.max(12,(H-18)/Math.max(1,data.length)); const max=Math.max(1,...data.map(d=>d.value)); data.forEach((d,i)=>{ const y=10+i*rowH; const w=(W-padL-padR)*d.value/max; svg.appendChild(node('text',{x:6,y:y+rowH*.65,'font-size':10,fill:css('--axislabel')})).textContent=String(d.label).slice(0,17); svg.appendChild(node('rect',{x:padL,y:y+2,width:w,height:Math.max(6,rowH-5),rx:4,fill:css('--brand2')})); svg.appendChild(node('text',{x:padL+w+4,y:y+rowH*.65,'font-size':10,fill:css('--ink')})).textContent=fmt0(d.value); }); }
function drawScatter(svg,rows){
  svgClear(svg); const W=svg.clientWidth||600,H=230,padL=44,padR=14,padT=22,padB=32;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const maxX=5,maxY=2.5;
  // sqrt scales spread the dense low-value region
  const xScale=a=>padL+Math.sqrt(clamp((a-1)/(maxX-1),0,1))*plotW;
  const yScale=c=>H-padB-Math.sqrt(clamp(c/maxY,0,1))*plotH;

  svg.appendChild(node('rect',{x:padL,y:padT,width:plotW,height:plotH,fill:'none',stroke:css('--axis')}));
  svg.appendChild(node('line',{x1:tx,y1:padT,x2:tx,y2:H-padB,stroke:css('--warn'),'stroke-dasharray':'4 4'}));
  svg.appendChild(node('line',{x1:padL,y1:ty,x2:W-padR,y2:ty,stroke:css('--warn'),'stroke-dasharray':'4 4'}));
  // axis ticks
  [1,1.32,2,3,5].forEach(v=>{ svg.appendChild(node('text',{x:xScale(v),y:H-padB+12,'text-anchor':'middle','font-size':9,fill:css('--axislabel')})).textContent=v; });
  [0,0.49,1,2.5].forEach(v=>{ svg.appendChild(node('text',{x:padL-5,y:yScale(v)+3,'text-anchor':'end','font-size':9,fill:css('--axislabel')})).textContent=v; });
  const sample = rows.length>1200 ? rows.filter((_,i)=>i%Math.ceil(rows.length/1200)===0) : rows;

  });
  svg.appendChild(node('text',{x:padL+plotW/2,y:H-4,'font-size':10,'text-anchor':'middle',fill:css('--axislabel')})).textContent=t('adiAxis');
  svg.appendChild(node('text',{x:6,y:14,'font-size':10,fill:css('--axislabel')})).textContent='CV²';
}
function drawWeekly(svg,rows){

  for(let g=0;g<=4;g++){ const gy=padT+(H-padT-padB)*g/4; svg.appendChild(node('line',{x1:padL,y1:gy,x2:W-padR,y2:gy,stroke:css('--axis'),'stroke-width':.6})); svg.appendChild(node('text',{x:padL-6,y:gy+3,'text-anchor':'end','font-size':9,fill:css('--axislabel')})).textContent=fmt0(maxY*(1-g/4)); }
  let area='M'+xs(0)+' '+ys(tot[0]), line='M'+xs(0)+' '+ys(tot[0]);

}
function drawMatrix(svg,rows){
  svgClear(svg); const W=svg.clientWidth||600,H=230,padL=60,padT=26,padB=16,padR=16;
  const cw=(W-padL-padR)/3, ch=(H-padT-padB)/3;

  rows.forEach(r=>{ const k=r.abc+r.xyz; counts[k]=(counts[k]||0)+1; max=Math.max(max,counts[k]); });
  const dark = theme==='dark';
  abcArr.forEach((a,i)=>{ svg.appendChild(node('text',{x:padL-10,y:padT+i*ch+ch/2+4,'text-anchor':'end','font-size':12,'font-weight':800,fill:css('--brand')})).textContent=a; });

  }));
}

/* ===================== CSV / XLSX parsing ===================== */
function parseCsv(text){
  const rows=[]; let row=[], cell='', q=false;
  for(let i=0;i<text.length;i++){ const ch=text[i], nx=text[i+1]; if(q){ if(ch==='"'&&nx==='"'){cell+='"';i++;} else if(ch==='"') q=false; else cell+=ch; } else { if(ch==='"') q=true; else if(ch===','){ row.push(cell); cell=''; } else if(ch==='\n'){ row.push(cell); rows.push(row); row=[]; cell=''; } else if(ch==='\r'){} else cell+=ch; } }
  row.push(cell); rows.push(row); return rows;
}
async function parseXlsx(buf){
  const files=await unzipXlsx(buf);
  const txt=path=>files[path] || files[path.replace(/^\//,'')];
  const workbook=txt('xl/workbook.xml'); if(!workbook) throw new Error('xl/workbook.xml not found');
  const rels=txt('xl/_rels/workbook.xml.rels')||'';
  const parser=new DOMParser(); const wbDoc=parser.parseFromString(workbook,'application/xml'); const firstSheet=wbDoc.querySelector('sheet'); if(!firstSheet) throw new Error('No sheet in workbook.');
  const rid=firstSheet.getAttribute('r:id'); let target='worksheets/sheet1.xml';
  if(rid && rels){ const relDoc=parser.parseFromString(rels,'application/xml'); const rel=[...relDoc.querySelectorAll('Relationship')].find(x=>x.getAttribute('Id')===rid); if(rel) target=rel.getAttribute('Target'); }
  let sheetPath='xl/'+target.replace(/^\//,''); sheetPath=sheetPath.replace('xl/xl/','xl/');
  const shared=parseSharedStrings(txt('xl/sharedStrings.xml')||''); const sheet=txt(sheetPath); if(!sheet) throw new Error('First sheet not found: '+sheetPath);
  return parseSheetXml(sheet,shared);
}

  if(eocd<0) throw new Error('Invalid ZIP.'); const entries=dv.getUint16(eocd+10,true); const cdOffset=dv.getUint32(eocd+16,true); let ptr=cdOffset; const out={};
  for(let e=0;e<entries;e++){
    if(dv.getUint32(ptr,true)!==0x02014b50) throw new Error('Invalid central directory.');

    const name=new TextDecoder().decode(bytes.slice(ptr+46,ptr+46+nameLen)); ptr += 46+nameLen+extraLen+commentLen;
    if(name.endsWith('/')) continue; const nameClean=name.replace(/^\//,'');

/* ===================== demo data ===================== */
function generateDemoRows(numSkus, periods){
  const headers=['Material','Descripcion','Family','Plant','LT','GR processing']; for(let i=1;i<=periods;i++) headers.push('W'+String(i).padStart(3,'0')); headers.push('Total');
  const families=[
    {name:'Bebidas',    products:['Agua Mineral','Refresco Cola','Jugo Naranja','Té Helado','Energizante'], base:[90,260], amp:.45, phase:26},
    {name:'Lácteos',    products:['Leche Entera','Yogurt Natural','Queso Panela','Crema Ácida','Mantequilla'], base:[60,180], amp:.15, phase:0},
    {name:'Snacks',     products:['Papas Sal','Cacahuate Japonés','Barras Granola','Galletas Choco','Palomitas'], base:[40,150], amp:.30, phase:44},
    {name:'Cuidado Personal',products:['Shampoo Herbal','Jabón Neutro','Crema Corporal','Pasta Dental','Desodorante'], base:[25,110], amp:.12, phase:10},
    {name:'Limpieza',   products:['Detergente Polvo','Cloro','Limpiador Multiusos','Suavizante','Aromatizante'], base:[30,120], amp:.22, phase:35},
    {name:'Refacciones',products:['Filtro Aceite','Balata Delantera','Bujía Iridium','Banda Distribución','Amortiguador'], base:[3,28], amp:.08, phase:0}
  ];
  const sizes=['250ml','500ml','1L','2L','Chico','Mediano','Grande','Familiar','x12','x24'];
  const plants=['MTY','QRO','SLP','GDL'];
  const rows=[headers]; let seed=17; const rnd=()=>{ seed=(seed*9301+49297)%233280; return seed/233280; };
  for(let i=1;i<=numSkus;i++){
    const f=families[i%families.length];
    const type=i%11===0?'lumpy':i%7===0?'intermittent':i%5===0?'erratic':'smooth';
    const lt=Math.round(7+rnd()*45), gr=Math.round(2+rnd()*12);
    const base=f.base[0]+rnd()*(f.base[1]-f.base[0]);
    const trend=(rnd()-.38)*.9/periods;           // some growing, some declining
    const promoEvery=Math.round(10+rnd()*16);     // periodic promo lift
    const desc=f.products[Math.floor(rnd()*f.products.length)]+' '+sizes[Math.floor(rnd()*sizes.length)];
    // per-SKU dispersion knobs: occasional zero weeks and noise amplitude vary by SKU
    const zeroP = type==='smooth' ? rnd()*rnd()*.19 : type==='erratic' ? rnd()*rnd()*.23 : 0;
    const noiseA = .10+rnd()*.55;                 // smooth noise amplitude varies per SKU
    const sizeA = .15+rnd()*.65;                  // intermittent demand-size variability per SKU
    const hitP = type==='intermittent' ? .22+rnd()*.38 : .16+rnd()*.28; // demand frequency varies
    const vals=[];
    for(let w=0;w<periods;w++){
      const season=1+f.amp*Math.sin(2*Math.PI*(w+f.phase)/52);
      const growth=1+trend*w;
      const promo=(w%promoEvery===promoEvery-1 && rnd()<.7)?1.5+rnd():1;
      let v=0;
      if(type==='smooth') v=(rnd()<zeroP)?0:base*season*growth*promo*(1-noiseA+rnd()*2*noiseA);
      else if(type==='erratic') v=(rnd()<zeroP)?0:base*season*growth*(rnd()<.28 ? 2.2+rnd()*4.5 : .12+rnd()*.75);
      else if(type==='intermittent') v=rnd()<hitP?base*season*(1-sizeA+rnd()*2*sizeA):0;
      else v=rnd()<hitP?base*(rnd()<.35 ? 3+rnd()*7 : .25+rnd()*.9):0;
      if(rnd()<.012) v*=4.2;                       // rare outlier spike
      vals.push(Math.round(Math.max(0,v)));
    }
    rows.push(['SKU-'+String(i).padStart(5,'0'),desc,f.name,plants[i%plants.length],lt,gr,...vals,vals.reduce((a,b)=>a+b,0)]);
  }
  return rows;
}
